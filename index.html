<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Hub</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:#fff;
}

header {
    text-align:center;
    padding:15px;
    background:#1a1a1a;
    border-bottom:2px solid gold;
}

.container {
    max-width:900px;
    margin:auto;
    padding:10px;
}

.sport-bar {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:6px;
    padding:10px;
}

button {
    padding:8px 10px;
    border:none;
    border-radius:5px;
    background:#222;
    color:white;
    cursor:pointer;
}

button.active {
    background:gold;
    color:black;
}

.match {
    background:#1c1c1c;
    margin:10px 0;
    padding:12px;
    border-left:4px solid #28a745;
    border-radius:6px;
}

a {
    display:inline-block;
    margin-top:8px;
    padding:6px 10px;
    background:gold;
    color:black;
    text-decoration:none;
    border-radius:5px;
}
</style>
</head>

<body>

<header>
    <h2>🏟️ Sports Hub Live</h2>
</header>

<div class="sport-bar">
    <button onclick="loadSport('Soccer', this)" class="active">Football</button>
    <button onclick="loadSport('Basketball', this)">Basketball</button>
    <button onclick="loadSport('Rugby League', this)">Rugby</button>
    <button onclick="loadSport('Cricket', this)">Cricket</button>
</div>

<div class="container">
    <div id="list">Loading...</div>
</div>

<script>

async function loadSport(sport, btn){

document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

let today = new Date().toISOString().split("T")[0];

let url = `https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=${today}&s=${sport}`;

let res = await fetch(url);
let data = await res.json();

let box = document.getElementById("list");
box.innerHTML = "";

if(!data.events){
box.innerHTML = "No matches today.";
return;
}

data.events.forEach(e=>{
let div = document.createElement("div");
div.className = "match";

div.innerHTML = `
<h3>${e.strEvent}</h3>
<p>${e.strTime || "TBA"} - ${e.strLeague}</p>
<a href="player.html?match=${encodeURIComponent(e.strEvent)}">Watch</a>
`;

box.appendChild(div);
});

}

loadSport("Soccer", document.querySelector("button"));

</script>

</body>
</html>
