<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Sports Live Hub</title>

<style>
body {
    background:#0f0f0f;
    color:#fff;
    font-family:Arial;
    margin:0;
}

header {
    background:#1a1a1a;
    padding:15px;
    text-align:center;
    border-bottom:2px solid gold;
}

.sports-bar {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    padding:10px;
}

.sport-btn {
    padding:8px 12px;
    border:1px solid gold;
    background:#222;
    color:#fff;
    cursor:pointer;
    border-radius:5px;
}

.sport-btn.active {
    background:gold;
    color:#000;
}

.container {
    max-width:900px;
    margin:auto;
    padding:10px;
}

.match-card {
    background:#1c1c1c;
    margin:10px 0;
    padding:12px;
    border-left:4px solid #28a745;
    border-radius:6px;
}

.btn {
    background:gold;
    color:#000;
    padding:6px 10px;
    text-decoration:none;
    border-radius:5px;
    display:inline-block;
    margin-top:8px;
}
</style>
</head>

<body>

<header>
    <h2>🏟️ VIP Sports Live Hub</h2>
</header>

<div class="sports-bar">
    <button class="sport-btn active" onclick="loadSport('Soccer', this)">Football</button>
    <button class="sport-btn" onclick="loadSport('Basketball', this)">Basketball</button>
    <button class="sport-btn" onclick="loadSport('Rugby%20League', this)">Rugby League</button>
    <button class="sport-btn" onclick="loadSport('Rugby%20Union', this)">Rugby Union</button>
    <button class="sport-btn" onclick="loadSport('American%20Football', this)">NFL</button>
    <button class="sport-btn" onclick="loadSport('Cricket', this)">Cricket</button>
</div>

<div class="container">
    <div id="match-list">Loading matches...</div>
</div>

<script>

async function loadSport(sport, btn) {
    document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const list = document.getElementById('match-list');
    list.innerHTML = "Loading...";

    const today = new Date().toISOString().split('T')[0];

    const url = `https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=${today}&s=${sport}`;

    try {
        const res = await fetch(url);
        const data = await res.json();

        if (!data.events) {
            list.innerHTML = "No matches today.";
            return;
        }

        list.innerHTML = "";

        data.events.forEach(e => {
            const div = document.createElement("div");
            div.className = "match-card";

            const match = encodeURIComponent(e.strEvent);

            div.innerHTML = `
                <h3>${e.strEvent}</h3>
                <p>${e.strTime || "TBA"} - ${e.strLeague}</p>
                <a class="btn" href="player.html?match=${match}">
                    Watch Match
                </a>
            `;

            list.appendChild(div);
        });

    } catch (err) {
        list.innerHTML = "Error loading data.";
    }
}

// default load
loadSport('Soccer', document.querySelector('.sport-btn'));

</script>

</body>
</html>
