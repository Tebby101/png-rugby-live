<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNG Rugby Live</title>

<style>
body {
    background-color: #121212;
    color: #fff;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
}

header {
    background-color: #1f1f1f;
    padding: 20px;
    border-bottom: 3px solid #ffcc00;
}

.container {
    max-width: 800px;
    margin: 20px auto;
    padding: 10px;
}

.match-card {
    background-color: #1f1f1f;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 15px;
    border-left: 5px solid #28a745;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    text-align: left;
}

.btn {
    background-color: #ffcc00;
    color: #121212;
    padding: 10px 15px;
    text-decoration: none;
    font-weight: bold;
    border-radius: 5px;
    display: inline-block;
}

#no-matches {
    color: #888;
    margin-top: 50px;
}
</style>
</head>

<body>

<header>
    <h1>🏆 PNG RUGBY LIVE</h1>
    <p>Free Automated Live Rugby Match Directory</p>
</header>

<main class="container">
    <h2>🔴 Today's Live & Upcoming Rugby Matches</h2>
    <div id="match-list">Loading today's schedule...</div>
</main>

<script>
async function fetchMatches() {
    const listContainer = document.getElementById('match-list');

    try {
        const today = new Date().toISOString().split('T')[0];

        const url = `https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=${today}&s=Rugby%20League`;

        const response = await fetch(url);
        const data = await response.json();

        if (!data.events) {
            listContainer.innerHTML = '<p id="no-matches">No rugby matches scheduled for today.</p>';
            return;
        }

        listContainer.innerHTML = '';

        data.events.forEach(event => {
            const matchCard = document.createElement('div');
            matchCard.className = 'match-card';

            const match = encodeURIComponent(event.strEvent);

            matchCard.innerHTML = `
                <div>
                    <strong>⏰ ${event.strTime || 'TBA'}</strong>
                    <h3>${event.strEvent}</h3>
                    <p>${event.strLeague}</p>
                </div>

                <div>
                    <a class="btn" href="player.html?match=${match}">
                        💻 Watch Feed
                    </a>
                </div>
            `;

            listContainer.appendChild(matchCard);
        });

    } catch (error) {
        console.log(error);

        listContainer.innerHTML = `
            <div class="match-card">
                <div>
                    <strong>🔴 LIVE</strong>
                    <h3>Rugby Feed Unavailable</h3>
                    <p>Try refreshing page</p>
                </div>
                <div>
                    <a class="btn" href="player.html?match=NRL">💻 Open Player</a>
                </div>
            </div>
        `;
    }
}

fetchMatches();
setInterval(fetchMatches, 60000);
</script>

</body>
</html>
