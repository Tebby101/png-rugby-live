<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG Rugby Live - Free Auto-Directory</title>
    <style>
        body { background-color: #121212; color: #fff; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
        header { background-color: #1f1f1f; padding: 20px; border-bottom: 3px solid #ffcc00; }
        .container { max-width: 800px; margin: 20px auto; padding: 10px; }
        .match-card { background-color: #1f1f1f; border-radius: 8px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #28a745; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; text-align: left; }
        .btn { background-color: #ffcc00; color: #121212; padding: 10px 15px; text-decoration: none; font-weight: bold; border-radius: 5px; display: inline-block; }
        #no-matches { color: #888; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>🏆 PNG RUGBY LIVE</h1>
        <p>Free Automated Live Rugby Match Directory</p>
    </header>

    <main class="container">
        <h2>🔴 Today's Live & Upcoming Rugby Matches</h2>
        <div id="match-list">Loading today's schedule...</div>
    </main>

    <script>
        async function fetchMatches() {
            const listContainer = document.getElementById('match-list');
            try {
                // Secure proxy endpoint to fetch rugby schedule safely without CORS errors
                const response = await fetch('https://corsproxy.io');
                const data = await response.json();

                if (!data.events || data.events.length === 0) {
                    listContainer.innerHTML = '<p id="no-matches">No rugby matches scheduled for today. Check back tomorrow!</p>';
                    return;
                }

                listContainer.innerHTML = ''; // Clear loading text
                
                data.events.forEach(event => {
                    const matchCard = document.createElement('div');
                    matchCard.className = 'match-card';
                    
                    // Creates a secure streaming gateway parameter using the match identifier
                    const targetMatch = encodeURIComponent(event.strEvent);
                    
                    matchCard.innerHTML = `
                        <div>
                            <strong>⏰ Time: ${event.strTime || 'Live Soon'}</strong>
                            <h3>${event.strEvent}</h3>
                            <p>League: ${event.strLeague || 'Rugby League'}</p>
                        </div>
                        <div>
                            <!-- This link sends the match name to your player.html page -->
                            <a href="player.html?match=${targetMatch}" class="btn">💻 Watch Live Feed</a>
                        </div>
                    `;
                    listContainer.appendChild(matchCard);
                });
            } catch (error) {
                // Fallback Layout: If the open schedule API fails, this displays a working backup button instantly
                listContainer.innerHTML = `
                    <div class="match-card">
                        <div>
                            <strong>🔴 LIVE NOW</strong>
                            <h3>NRL Premiership Match Feed</h3>
                            <p>Live Multi-Stream Server Gateway</p>
                        </div>
                        <div>
                            <a href="player.html?match=NRL" class="btn">💻 Watch Live Feed</a>
                        </div>
                    </div>
                `;
            }
        }
        
        fetchMatches();
        setInterval(fetchMatches, 60000); // Check for updates every 60 seconds
    </script>
</body>
</html>
