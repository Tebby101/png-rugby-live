<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Player</title>

<style>
body {
    margin:0;
    background:#000;
    color:white;
    font-family:Arial;
    text-align:center;
}

header {
    padding:12px;
    background:#111;
    border-bottom:2px solid gold;
}

.box {
    padding:20px;
}

a {
    display:block;
    margin:10px;
    padding:12px;
    background:gold;
    color:black;
    text-decoration:none;
    border-radius:6px;
}
</style>
</head>

<body>

<header>
<h3 id="title">Loading...</h3>
</header>

<div class="box" id="content"></div>

<script>
let match = new URLSearchParams(window.location.search).get("match") || "sports match";

document.getElementById("title").innerText = "🏟️ " + match;

let searchQuery = encodeURIComponent(match + " highlights full match");

// SAFE METHOD (NO BROKEN VIDEO)
document.getElementById("content").innerHTML = `
    <a href="https://www.youtube.com/results?search_query=${searchQuery}" target="_blank">
        ▶ Watch on YouTube (Works 100%)
    </a>

    <a href="https://www.google.com/search?q=${searchQuery}" target="_blank">
        🔍 Search More Streams
    </a>
`;
</script>

</body>
</html>
