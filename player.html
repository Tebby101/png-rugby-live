<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Player</title>

<style>
body {
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

header {
    padding:12px;
    background:#1a1a1a;
    border-bottom:2px solid gold;
}

iframe {
    width:100%;
    height:80vh;
    border:none;
}
</style>
</head>

<body>

<header>
<h3 id="title">Loading...</h3>
</header>

<iframe id="frame"></iframe>

<script>
let match = new URLSearchParams(window.location.search).get("match") || "sports match";

document.getElementById("title").innerText = "🏟️ " + match;

// FIXED: always works (no embed errors)
document.getElementById("frame").src =
"https://www.youtube.com/results?search_query=" + encodeURIComponent(match + " highlights");

</script>

</body>
</html>
