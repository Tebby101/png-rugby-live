<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Sports Player</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: #fff;
}

header {
    padding: 12px;
    text-align: center;
    background: #1a1a1a;
    border-bottom: 2px solid gold;
}

#match-title {
    font-size: 18px;
    margin: 10px 0;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 10px;
}

.video-box {
    width: 100%;
    aspect-ratio: 16/9;
    background: #111;
    border: 2px solid gold;
    border-radius: 8px;
    overflow: hidden;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.server-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 10px 0;
    flex-wrap: wrap;
}

.btn {
    padding: 8px 12px;
    background: #222;
    border: 1px solid gold;
    color: #fff;
    cursor: pointer;
    border-radius: 5px;
    font-size: 13px;
}

.btn.active {
    background: gold;
    color: #000;
}

.section {
    margin-top: 20px;
}

.card {
    background: #1c1c1c;
    padding: 10px;
    margin: 8px 0;
    border-left: 4px solid #28a745;
    border-radius: 6px;
}

.small {
    font-size: 13px;
    color: #aaa;
}

.link {
    display: inline-block;
    margin-top: 6px;
    padding: 6px 10px;
    background: gold;
    color: #000;
    text-decoration: none;
    border-radius: 5px;
    font-size: 13px;
}
</style>
</head>

<body>

<header>
    <div id="match-title">Loading match...</div>
</header>

<div class="container">

    <!-- PLAYER -->
    <div class="server-bar">
        <button class="btn active" onclick="loadServer(1, this)">Server 1</button>
        <button class="btn" onclick="loadServer(2, this)">Server 2</button>
        <button class="btn" onclick="loadServer(3, this)">Server 3</button>
    </div>

    <div class="video-box">
        <iframe id="player" allowfullscreen></iframe>
    </div>

    <!-- RELATED -->
    <div class="section">
        <h3>🔥 Related Videos</h3>
        <div id="related">Loading...</div>
    </div>

</div>

<script>

const urlParams = new URLSearchParams(window.location.search);
let match = urlParams.get('match') || 'NRL Rugby';

document.getElementById("match-title").innerText = match;

function loadServer(num, btn) {
    document.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    const query = encodeURIComponent(match + " live rugby highlights");

    // SAFE EMBED (works on GitHub Pages)
    const youtube = `https://www.youtube.com/embed?listType=search&list=${query}`;

    document.getElementById("player").src = youtube;
}

// related videos section
function loadRelated() {
    const box = document.getElementById("related");

    const queries = [
        match + " highlights",
        match + " full match",
        "rugby highlights",
        "sports highlights today"
    ];

    box.innerHTML = "";

    queries.forEach(q => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="small">${q}</div>
            <a class="link" target="_blank"
               href="https://www.youtube.com/results?search_query=${encodeURIComponent(q)}">
               Watch
            </a>
        `;

        box.appendChild(div);
    });
}

// init
loadServer(1, document.querySelector(".btn"));
loadRelated();

</script>

</body>
</html>
